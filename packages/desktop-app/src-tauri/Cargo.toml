[package]
name = "nodespace-app"
version = "0.1.6"
description = "NodeSpace AI-Native Knowledge Management Desktop Application"
authors = ["NodeSpace Team"]
edition = "2021"
default-run = "nodespace-app"

[lib]
name = "nodespace_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[[bin]]
name = "nodespace-app"
path = "src/main.rs"

# Note: dev-proxy and dev-mcp have been moved to packages/dev-tools
# to exclude them from Tauri release builds

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
anyhow = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
tauri-plugin-decorum = "1.1.1"
nodespace-daemon = { workspace = true }
tonic = "0.12"
tower = { version = "0.5", features = ["util"] }
hyper-util = { version = "0.1", features = ["tokio"] }
dirs = "5.0"
libc = "0.2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"
tokio-stream = "0.1"
tokio-util = "0.7"
async-stream = "0.3"
async-trait = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = "3"
