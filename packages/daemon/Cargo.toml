[package]
name = "nodespace-daemon"
version = "0.1.0"
description = "gRPC daemon for NodeSpace services — compiled proto types and service definitions"
authors.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "nodespaced"
path = "src/main.rs"

[dependencies]
tonic = "0.12"
prost = "0.13"
tokio = { workspace = true }
tokio-stream = "0.1"
async-stream = "0.3"
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { workspace = true }
serde_json = { workspace = true }
toml = "0.8"
uuid = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
nodespace-core = { workspace = true }
nodespace-agent = { workspace = true }
nodespace-nlp-engine = { workspace = true }

# System tray (ADR-031): the daemon owns the tray icon, not the Tauri app.
# tray-icon ships an event loop via `tao`; we run it on the main thread on
# macOS (NSApplication requirement) and the gRPC server inside a dedicated
# tokio runtime on a worker thread.
tray-icon = "0.21"
tao = "0.31"
image = { version = "0.25", default-features = false, features = ["png"] }
tower = { version = "0.5", features = ["util"] }

[build-dependencies]
tonic-build = "0.12"
protoc-bin-vendored = "3"

[dev-dependencies]
tempfile = "3.0"
# Integration tests need PtySession::launch_for_test to spawn shell utilities
# (echo, cat) without a real agent binary. The `testing` feature exposes that
# helper as part of the agent crate's public surface.
nodespace-agent = { workspace = true, features = ["testing"] }
tokio = { workspace = true, features = ["full", "test-util"] }
tokio-stream = "0.1"
tonic = "0.12"
