name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (or all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - macos-arm
          - macos-intel
          - windows
          - linux-arm
          - linux-x86

# Required permissions for uploading release assets
permissions:
  contents: write

jobs:
  # macOS ARM is a standalone job so publish-npm can depend on it alone,
  # without being blocked by the Intel or Windows legs.
  build-tauri-macos-arm:
    name: Build Tauri (macOS ARM)
    runs-on: macos-latest
    if: github.event_name == 'release' || inputs.platform == 'all' || inputs.platform == 'macos-arm'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/desktop-app/src-tauri -> target'

      - name: Install Protobuf
        run: brew install protobuf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"

      - name: Install frontend dependencies
        run: bun install

      - name: Generate SvelteKit types
        run: bun run --cwd packages/desktop-app sync

      - name: Download embedding model for bundling
        run: |
          mkdir -p packages/desktop-app/src-tauri/resources/models
          gh release download models-v2 --pattern "nomic-embed-text-v1.5.Q8_0.gguf" --dir packages/desktop-app/src-tauri/resources/models/
          echo "Model downloaded:"
          ls -la packages/desktop-app/src-tauri/resources/models/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build nodespaced and nodespace sidecars
        run: |
          TRIPLE="aarch64-apple-darwin"
          BIN_DIR="packages/desktop-app/src-tauri/binaries"

          echo "Building nodespaced for ${TRIPLE}..."
          cargo build --release --bin nodespaced --target "${TRIPLE}"
          cp "target/${TRIPLE}/release/nodespaced" "${BIN_DIR}/nodespaced-${TRIPLE}"
          chmod +x "${BIN_DIR}/nodespaced-${TRIPLE}"

          echo "Building nodespace CLI for ${TRIPLE}..."
          cargo build --release --bin nodespace --target "${TRIPLE}"
          cp "target/${TRIPLE}/release/nodespace" "${BIN_DIR}/nodespace-${TRIPLE}"
          chmod +x "${BIN_DIR}/nodespace-${TRIPLE}"

          echo "Sidecars built:"
          ls -la "${BIN_DIR}/"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Michael Libio (F4M5J7YNLS)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: packages/desktop-app
          tauriScript: bunx tauri
          args: '--target aarch64-apple-darwin'
          releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}

      - name: Upload artifacts (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: binaries-macos-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/bundle/
          if-no-files-found: warn

  build-tauri:
    name: Build Tauri (other platforms)
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - platform: 'windows-latest'
            args: ''
            rust_targets: ''
            id: 'windows'
          # macOS Intel
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_targets: 'x86_64-apple-darwin'
            id: 'macos-intel'

    runs-on: ${{ matrix.platform }}

    steps:
      # Platform filter: skip early for unselected platforms (workflow_dispatch only)
      - name: Check platform filter
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || [[ "${{ inputs.platform }}" == "all" ]] || [[ "${{ inputs.platform }}" == "${{ matrix.id }}" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.id }} (selected: ${{ inputs.platform }})"
          fi

      - name: Checkout repository
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Install Rust stable
        if: steps.filter.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        if: steps.filter.outputs.skip != 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/desktop-app/src-tauri -> target'

      - name: Install Protobuf (macOS)
        if: steps.filter.outputs.skip != 'true' && matrix.platform == 'macos-latest'
        run: brew install protobuf

      - name: Install Protobuf (Windows)
        if: steps.filter.outputs.skip != 'true' && matrix.platform == 'windows-latest'
        run: choco install protoc

      # Pre-install WiX toolset to avoid flaky GitHub release downloads during tauri build
      - name: Install WiX Toolset (Windows)
        if: steps.filter.outputs.skip != 'true' && matrix.platform == 'windows-latest'
        run: |
          $wixDir = "$env:LOCALAPPDATA\tauri\WixTools314"
          New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
          $wixUrl = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          $wixZip = "$env:TEMP\wix314-binaries.zip"
          # Retry download up to 3 times with longer timeout
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Write-Host "Downloading WiX toolset (attempt $i of $maxRetries)..."
              Invoke-WebRequest -Uri $wixUrl -OutFile $wixZip -TimeoutSec 300
              break
            } catch {
              if ($i -eq $maxRetries) { throw }
              Write-Host "Download failed, retrying in 10 seconds..."
              Start-Sleep -Seconds 10
            }
          }
          Write-Host "Extracting WiX toolset..."
          Expand-Archive -Path $wixZip -DestinationPath $wixDir -Force
          Remove-Item $wixZip
          Write-Host "WiX toolset installed to $wixDir"

      - name: Setup Bun
        if: steps.filter.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"

      - name: Install frontend dependencies
        if: steps.filter.outputs.skip != 'true'
        run: bun install

      - name: Generate SvelteKit types
        if: steps.filter.outputs.skip != 'true'
        run: bun run --cwd packages/desktop-app sync

      # Download nomic-embed-text GGUF model for llama.cpp embeddings
      - name: Download embedding model for bundling (macOS)
        if: steps.filter.outputs.skip != 'true' && matrix.platform == 'macos-latest'
        run: |
          mkdir -p packages/desktop-app/src-tauri/resources/models
          # Download pre-packaged model from GitHub releases (models-v2 for llama.cpp)
          gh release download models-v2 --pattern "nomic-embed-text-v1.5.Q8_0.gguf" --dir packages/desktop-app/src-tauri/resources/models/
          echo "Model downloaded:"
          ls -la packages/desktop-app/src-tauri/resources/models/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download embedding model for bundling (Windows)
        if: steps.filter.outputs.skip != 'true' && matrix.platform == 'windows-latest'
        run: |
          $modelsDir = "packages/desktop-app/src-tauri/resources/models"
          New-Item -ItemType Directory -Force -Path $modelsDir | Out-Null
          # Download pre-packaged model from GitHub releases (models-v2 for llama.cpp)
          gh release download models-v2 --pattern "nomic-embed-text-v1.5.Q8_0.gguf" --dir $modelsDir
          Write-Host "Model downloaded:"
          Get-ChildItem -Path $modelsDir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build nodespaced and nodespace CLI sidecars for macOS bundle (Issue #1179).
      # The binaries are placed in the exact path tauri.conf.json externalBin expects.
      - name: Build nodespaced and nodespace sidecars (macOS)
        if: steps.filter.outputs.skip != 'true' && matrix.platform == 'macos-latest'
        run: |
          TRIPLE="${{ matrix.rust_targets }}"
          BIN_DIR="packages/desktop-app/src-tauri/binaries"

          echo "Building nodespaced for ${TRIPLE}..."
          cargo build --release --bin nodespaced --target "${TRIPLE}"
          cp "target/${TRIPLE}/release/nodespaced" "${BIN_DIR}/nodespaced-${TRIPLE}"
          chmod +x "${BIN_DIR}/nodespaced-${TRIPLE}"

          echo "Building nodespace CLI for ${TRIPLE}..."
          cargo build --release --bin nodespace --target "${TRIPLE}"
          cp "target/${TRIPLE}/release/nodespace" "${BIN_DIR}/nodespace-${TRIPLE}"
          chmod +x "${BIN_DIR}/nodespace-${TRIPLE}"

          echo "Sidecars built:"
          ls -la "${BIN_DIR}/"

      - name: Build Tauri app
        if: steps.filter.outputs.skip != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS minimum version — must be 14.0+ for Metal GPU embeddings (ggml)
          # 10.15 caused ggml_mul_mat assertion failures in build_pooling (#990)
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          # Apple code signing and notarization (macOS only)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Michael Libio (F4M5J7YNLS)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: packages/desktop-app
          tauriScript: bunx tauri
          args: ${{ matrix.args }}
          # Only set releaseId when triggered by release event (undefined for workflow_dispatch)
          releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}

      - name: Upload artifacts (workflow_dispatch only)
        if: steps.filter.outputs.skip != 'true' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}-${{ matrix.rust_targets || 'default' }}
          path: |
            target/${{ matrix.rust_targets || '' }}/release/bundle/
            target/release/bundle/
          if-no-files-found: warn

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: build-tauri-macos-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (agent-tools)
        run: bun install
        working-directory: packages/agent-tools

      - name: Set version from release tag (agent-tools)
        run: |
          TAG="${{ github.event.release.tag_name }}"
          npm version "${TAG#v}" --no-git-tag-version
        working-directory: packages/agent-tools

      - name: Build @nodespaceai/agent-tools
        run: bun run build
        working-directory: packages/agent-tools

      - name: Publish @nodespaceai/agent-tools
        run: npm publish --access public
        working-directory: packages/agent-tools
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies (skill)
        run: bun install
        working-directory: packages/skill

      - name: Set version from release tag (skill)
        run: |
          TAG="${{ github.event.release.tag_name }}"
          npm version "${TAG#v}" --no-git-tag-version
        working-directory: packages/skill

      - name: Build @nodespaceai/skill
        run: bun run build
        working-directory: packages/skill

      - name: Publish @nodespaceai/skill
        run: npm publish --access public
        working-directory: packages/skill
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew-cask:
    name: Update Homebrew cask
    runs-on: macos-latest
    # Waits for all platform builds so both DMG SHAs are available.
    needs: [build-tauri-macos-arm, build-tauri]
    if: github.event_name == 'release'

    steps:
      - name: Compute version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS DMGs and compute SHA256
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # DMG filenames are set by Tauri productName in tauri.conf.json.
          # Pattern: NodeSpace_<version>_aarch64.dmg / NodeSpace_<version>_x64.dmg
          gh release download "${{ github.ref_name }}" \
            --repo NodeSpaceAI/nodespace-core \
            --pattern "NodeSpace_${VERSION}_aarch64.dmg" \
            --pattern "NodeSpace_${VERSION}_x64.dmg"

          ARM_SHA=$(shasum -a 256 "NodeSpace_${VERSION}_aarch64.dmg" | cut -d' ' -f1)
          X64_SHA=$(shasum -a 256 "NodeSpace_${VERSION}_x64.dmg" | cut -d' ' -f1)

          echo "arm_sha=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "x64_sha=${X64_SHA}" >> "$GITHUB_OUTPUT"

      - name: Clone homebrew-nodespace tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/NodeSpaceAI/homebrew-nodespace.git" tap

      - name: Update cask formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARM_SHA: ${{ steps.sha.outputs.arm_sha }}
          X64_SHA: ${{ steps.sha.outputs.x64_sha }}
        run: |
          CASK="tap/Casks/nodespace.rb"

          # Update version (awk used throughout for portability — avoids BSD vs GNU sed differences)
          awk -v ver="$VERSION" '
            /^  version "/ { sub(/version ".*"/, "version \"" ver "\""); print; next }
            { print }
          ' "$CASK" > "$CASK.tmp" && mv "$CASK.tmp" "$CASK"

          # Update arm SHA256 (line immediately after "on_arm do")
          awk -v sha="$ARM_SHA" '
            /on_arm do/ { print; getline; sub(/sha256 ".*"/, "sha256 \"" sha "\""); print; next }
            { print }
          ' "$CASK" > "$CASK.tmp" && mv "$CASK.tmp" "$CASK"

          # Update intel SHA256 (line immediately after "on_intel do")
          awk -v sha="$X64_SHA" '
            /on_intel do/ { print; getline; sub(/sha256 ".*"/, "sha256 \"" sha "\""); print; next }
            { print }
          ' "$CASK" > "$CASK.tmp" && mv "$CASK.tmp" "$CASK"

      - name: Open PR to homebrew-nodespace
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          BRANCH="update-cask-v${VERSION}"

          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Idempotent: skip if a PR for this version already exists
          if gh pr view "$BRANCH" --repo NodeSpaceAI/homebrew-nodespace &>/dev/null; then
            echo "PR for ${BRANCH} already exists — skipping"
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add Casks/nodespace.rb
          git commit -m "Update NodeSpace cask to v${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --repo NodeSpaceAI/homebrew-nodespace \
            --title "Update NodeSpace cask to v${VERSION}" \
            --body "Automated cask update from release workflow.

- Version: \`${VERSION}\`
- Source: NodeSpaceAI/nodespace-core@\`${{ github.ref_name }}\`" \
            --base main \
            --head "$BRANCH"

  build-headless:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            id: macos-arm
          - os: macos-latest
            target: x86_64-apple-darwin
            id: macos-intel
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            id: linux-arm
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            id: linux-x86

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check platform filter
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || [[ "${{ inputs.platform }}" == "all" ]] || [[ "${{ inputs.platform }}" == "${{ matrix.id }}" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.id }} (selected: ${{ inputs.platform }})"
          fi

      - name: Checkout repository
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Install Rust stable
        if: steps.filter.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        if: steps.filter.outputs.skip != 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install Protobuf (macOS)
        if: steps.filter.outputs.skip != 'true' && matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install Protobuf (Linux)
        if: steps.filter.outputs.skip != 'true' && matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install cross-compilation toolchain (Linux ARM)
        if: steps.filter.outputs.skip != 'true' && matrix.id == 'linux-arm'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build nodespaced
        if: steps.filter.outputs.skip != 'true'
        run: cargo build --release --bin nodespaced --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.id == 'linux-arm' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Build nodespace CLI
        if: steps.filter.outputs.skip != 'true'
        run: cargo build --release --bin nodespace --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.id == 'linux-arm' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Rename binaries with target triple suffix
        if: steps.filter.outputs.skip != 'true'
        run: |
          cp target/${{ matrix.target }}/release/nodespaced nodespaced-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/nodespace nodespace-${{ matrix.target }}

      - name: Upload binaries to release
        if: steps.filter.outputs.skip != 'true' && github.event_name == 'release'
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            nodespaced-${{ matrix.target }} \
            nodespace-${{ matrix.target }} \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-checksums:
    needs: build-headless
    runs-on: ubuntu-22.04
    if: github.event_name == 'release'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binaries from release
        run: |
          gh release download ${{ github.event.release.tag_name }} \
            --pattern 'nodespaced-*' --pattern 'nodespace-*' \
            --dir artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum nodespaced-* nodespace-* > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS to release
        run: |
          gh release upload ${{ github.event.release.tag_name }} artifacts/SHA256SUMS --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
